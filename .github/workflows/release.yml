name: Release

on:
  push:
    tags:
      - "**"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update"
        required: true
        type: string
      release_name:
        description: "Release name. Defaults to the tag when empty"
        required: false
        type: string
      body:
        description: "Release notes"
        required: false
        type: string
        default: "Manual release"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: maven

      - name: Build
        run: mvn -B clean package

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
            name="${{ inputs.release_name }}"
            body="${{ inputs.body }}"
          else
            tag="${{ github.ref_name }}"
            name="${{ github.ref_name }}"
            body="添加workflow自动编译"
          fi
          if [ -z "$name" ]; then
            name="$tag"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          {
            echo "body<<EOF"
            echo "$body"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          body: ${{ steps.release_meta.outputs.body }}
          files: |
            target/cfr-selective-dec.jar
